version: '3.8'

services:
  # The API (We will build this)
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=delivery_password
      - DB_NAME=delivery_db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    volumes:
      - ./src:/app/src # Enable live reloading (Hot Restart)

  # The Database (WITH MAP SUPERPOWERS)
  db:
    image: postgis/postgis:15-3.3-alpine # <--- CRITICAL CHANGE
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=delivery_password
      - POSTGRES_DB=delivery_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: